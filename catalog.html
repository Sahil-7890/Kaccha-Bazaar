<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Prices - Kaccha Bazaar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="animated-bg">

    <nav class="navbar">
        
        <a href="index.html" class="logo-link">
            <img src="images/logo.png" alt="Kaccha Bazaar Logo" class="brand-logo">
        </a>

        <a href="index.html" style="text-decoration:none; color:#1a56db; font-weight:600; font-size: 1.1rem;"><i class="fa-solid fa-house"></i> Home</a>
    </nav>

    <section class="catalog" style="border-radius: 0; min-height: 100vh; margin-top: 0; box-shadow: none;">
        
        <div class="catalog-header">
            
            <div class="catalog-titles">
                <div class="live-badge">
                    <span class="status-dot"></span> LIVE MARKET
                </div>
                <h2 class="gradient-text">Daily Market Prices</h2>
                <p>Today's fresh prices in ₹ (INR) — updated regularly</p>
            </div>
            
            <div class="header-controls">
                <div class="search-box">
                    🔍 <input type="text" id="searchInput" placeholder="Search items or keywords...">
                </div>
                <div class="filter-dropdown-container">
                    <select id="category-dropdown" class="category-dropdown">
                        </select>
                    <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                </div>
            </div>

        </div>

        <div id="product-grid" class="grid-container">
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
        </div>
        
        <p id="loading-msg" style="text-align: center; color: #64748b; font-weight: 500; margin-top: 30px;">Fetching today's fresh rates...</p>
    </section>

    <script src="script.js"></script>
